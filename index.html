<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heavenly Colours</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
top:0;left:0;
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:3.5rem;
font-family:'Orbitron',sans-serif;
text-shadow:0 0 20px #00d4ff;
}

.hero p{
margin-top:15px;
opacity:0.8;
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 40px;
border-radius:40px;
background:#00d4ff;
color:black;
font-weight:bold;
text-decoration:none;
box-shadow:0 0 20px #00d4ff;
}

/* SECTIONS */
section{
padding:100px 40px;
text-align:center;
}

h2{
font-size:2.5rem;
margin-bottom:30px;
}

/* BEFORE AFTER */
.split{
display:flex;
flex-wrap:wrap;
}

.split div{
flex:1;
min-height:300px;
background-size:cover;
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00d4ff;
}

/* CTA BAR */
.cta-bar{
background:#00d4ff;
color:black;
padding:40px;
font-size:1.5rem;
}

/* FOOTER */
footer{
padding:40px;
text-align:center;
background:#000;
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1>We Don’t Paint Houses.<br>We Create <span style="color:#00d4ff;">Luxury Spaces</span></h1>
<p>London Ontario’s Premium Painting & Landscaping Experts</p>
<a href="#contact" class="btn">Get Free Quote</a>
</div>
</div>

<section>
<h2>Before → After</h2>
<div class="split">
<div style="background:url('https://images.unsplash.com/photo-1581578731548-c64695cc6952') center/cover;"></div>
<div style="background:url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c') center/cover;"></div>
</div>
</section>

<section>
<h2>What We Do</h2>
<div class="services">
<div class="card">Interior Transformations</div>
<div class="card">Exterior Makeovers</div>
<div class="card">Luxury Landscaping</div>
<div class="card">Full Home Upgrades</div>
</div>
</section>

<div class="cta-bar">
🔥 Book Now — Spots Fill Fast
</div>

<section id="contact">
<h2>Get Your Quote</h2>
<form action="https://formspree.io/f/YOURCODE" method="POST">
<input type="text" name="name" placeholder="Name" required style="width:100%;padding:15px;margin-bottom:10px;">
<input type="email" name="email" placeholder="Email" required style="width:100%;padding:15px;margin-bottom:10px;">
<textarea name="message" placeholder="Describe your project" style="width:100%;padding:15px;"></textarea>
<button style="margin-top:10px;padding:15px;width:100%;background:#00d4ff;border:none;">Send</button>
</form>
</section>

<footer>
<p>© Heavenly Colours</p>
</footer>

</body>
</html>
